<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYC Catering - Lima</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

header{
    padding:30px;
}

header img{
    width:200px;
}

section{
    padding:40px 20px;
}

h2{
    margin-bottom:20px;
    color:#00c3ff;
}

.galeria{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:15px;
    padding:20px;
}

.galeria img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.galeria img:hover{
    transform:scale(1.05);
}

.modal{
    display:none;
    position:fixed;
    z-index:999;
    padding-top:50px;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
}

.modal img{
    width:80%;
    max-width:800px;
}

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px 20px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <img src="logo.jpg" alt="MYC Catering Logo">
</header>

<section>
    <h2>Eventos y Catering en Lima</h2>
    <p>Especialistas en eventos corporativos, cumpleaños, bodas y reuniones privadas.</p>
    <p>Ofrecemos servicio personalizado y presupuestos a medida.</p>
</section>

<section>
    <h2>Nuestros Eventos</h2>
    <div class="galeria">
        <img src="foto1.jpg" onclick="abrir(this.src)">
        <img src="foto2.jpg" onclick="abrir(this.src)">
        <img src="foto3.jpg" onclick="abrir(this.src)">
    </div>
</section>

<div id="modal" class="modal" onclick="cerrar()">
    <img id="imgGrande">
</div>

<a class="whatsapp" href="https://wa.me/51971745898" target="_blank">
    WhatsApp
</a>

<script>
function abrir(src){
    document.getElementById("modal").style.display="block";
    document.getElementById("imgGrande").src=src;
}

function cerrar(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
